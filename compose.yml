services:
  app:
    build:
      context: ./app
      args:
        FLAVOR: ${KOMUNITIN_FLAVOR}
    restart: unless-stopped
    ports:
      - "2030:80"
    environment:
      OAUTH_CLIENTID: komunitin-app
      MOCK_ENABLE: false
      AUTH_URL: ${KOMUNITIN_AUTH_URL}
      SOCIAL_URL: ${KOMUNITIN_SOCIAL_URL}
      FILES_URL: ${KOMUNITIN_SOCIAL_URL}
      ACCOUNTING_URL: ${KOMUNITIN_ACCOUNTING_URL}
      NOTIFICATIONS_URL: ${KOMUNITIN_NOTIFICATIONS_URL}
      FEEDBACK_URL: ${KOMUNITIN_FEEDBACK_URL}
      DOCS_URL: ${KOMUNITIN_DOCS_URL}
      PUSH_NOTIFICATIONS_VAPID_PUBLIC_KEY: ${PUSH_NOTIFICATIONS_VAPID_PUBLIC_KEY}
      GTAG_ID: ${GTAG_ID}
      MATOMO_URL: ${MATOMO_URL}
      MATOMO_SITE_ID: ${MATOMO_SITE_ID}

  db-auth:
    build:
      context: ./shared/docker/db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_APP_USER: auth
      POSTGRES_APP_PASSWORD: auth
      WALG_ENABLE: ${DB_BACKUP_ENABLE:-true}
      WALG_S3_PREFIX: ${S3_PREFIX}/db-auth
      WALG_COMPRESSION_METHOD: zstd
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      AWS_ENDPOINT: ${S3_ENDPOINT}
      AWS_REGION: ${S3_REGION:-us-east-1}
      AWS_S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    volumes:
      - db-auth:/var/lib/postgresql/data

  auth:
    build:
      context: ./auth
    ports:
      - "2026:2026"
    depends_on:
      - db-auth
    restart: unless-stopped
    environment:
      PORT: 2026
      DATABASE_URL: postgresql://auth:auth@db-auth:5432/auth?schema=public
      JWT_ISSUER: ${KOMUNITIN_AUTH_URL:-http://localhost:2026}
      JWT_AUDIENCE: urn:komunitin:api
      NOTIFICATIONS_URL: http://notifications-ts:2023
      NOTIFICATIONS_EVENTS_USERNAME: komunitin
      NOTIFICATIONS_EVENTS_PASSWORD: ${KOMUNITIN_NOTIFICATIONS_SECRET}
      NOTIFICATIONS_CLIENT_SECRET: ${KOMUNITIN_NOTIFICATIONS_SECRET}
      SOCIAL_CLIENT_SECRET: ${KOMUNITIN_SOCIAL_SECRET}

  db-notifications:
    image: redis:7
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - db-notifications:/data

  db-accounting:
    build:
      context: ./shared/docker/db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_APP_USER: accounting
      POSTGRES_APP_PASSWORD: accounting
      WALG_ENABLE: ${DB_BACKUP_ENABLE:-true}
      WALG_S3_PREFIX: ${S3_PREFIX}/db-accounting
      WALG_COMPRESSION_METHOD: zstd
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      AWS_ENDPOINT: ${S3_ENDPOINT}
      AWS_REGION: ${S3_REGION}
      AWS_S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}

    volumes:
      - db-accounting:/var/lib/postgresql/data

  accounting:
    build:
      context: ./accounting
    ports:
      - "2025:2025"
    depends_on:
      - db-accounting
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://accounting:accounting@db-accounting:5432/accounting?schema=public
      MASTER_PASSWORD: ${KOMUNITIN_ACCOUNTING_MASTER_PASSWORD}
      STELLAR_NETWORK: ${STELLAR_NETWORK}
      STELLAR_HORIZON_URL: ${STELLAR_HORIZON_URL}
      STELLAR_FRIENDBOT_URL: ${STELLAR_HORIZON_URL}/friendbot
      STELLAR_CHANNEL_ACCOUNTS_ENABLED: true
      DOMAIN: ${KOMUNITIN_DOMAIN}
      MASTER_PASSWORD_SALT: ${KOMUNITIN_ACCOUNTING_MASTER_PASSWORD_SALT}
      AUTH_JWKS_URL: http://auth:2026/.well-known/jwks.json
      AUTH_JWT_ISSUER: ${KOMUNITIN_AUTH_URL:-http://localhost:2026}
      AUTH_JWT_AUDIENCE: urn:komunitin:api
      NOTIFICATIONS_API_URL: http://notifications-ts:2023
      API_BASE_URL: ${KOMUNITIN_ACCOUNTING_URL}
      APP_URL: ${KOMUNITIN_APP_URL}
      NOTIFICATIONS_API_USERNAME: komunitin
      NOTIFICATIONS_API_PASSWORD: ${KOMUNITIN_NOTIFICATIONS_SECRET}
      SPONSOR_PRIVATE_KEY: ${KOMUNITIN_ACCOUNTING_SPONSOR_PRIVATE_KEY}
      DOCKER: true
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db-integralces:
    image: mariadb
    restart: unless-stopped
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: yes
      MYSQL_DATABASE: integralces
      MYSQL_USER: integralces
      MYSQL_PASSWORD: ${ICES_MYSQL_PASSWORD:-integralces}
    volumes:
      - db-integralces:/var/lib/mysql

  integralces:
    build:
      context: ../ices
    restart: unless-stopped
    expose:
      - "2029"
    ports:
      - "2029:2029"
    depends_on:
      - db-integralces
    environment:
      NOTIFICATIONS_CLIENT_ID: komunitin-notifications
      NOTIFICATIONS_CLIENT_SECRET: ${KOMUNITIN_NOTIFICATIONS_SECRET}
      NOTIFICATIONS_API_URL: http://notifications-ts:2023
      NOTIFICATIONS_EVENTS_USERNAME: komunitin
      NOTIFICATIONS_EVENTS_PASSWORD: ${KOMUNITIN_NOTIFICATIONS_SECRET}
      MAILERSEND_API_KEY: ${MAILERSEND_API_KEY}
      CES_USER_GOOGLE_MAPS_KEY: ${GOOGLE_MAPS_KEY}
    volumes:
      - "integralces-sites:/var/www/html/sites"
      - "../ices:/var/www/html/sites/all/modules/ices"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  notifications-ts:
    build:
      context: ./notifications-ts
    restart: unless-stopped
    ports:
      - "2023:2023"
    depends_on:
      - db-notifications-ts
      - db-notifications
    environment:
      KOMUNITIN_AUTH_URL: http://auth:2026
      KOMUNITIN_SOCIAL_URL: http://social:2028
      KOMUNITIN_SOCIAL_PUBLIC_URL: ${KOMUNITIN_SOCIAL_URL:-http://localhost:2028}
      KOMUNITIN_ACCOUNTING_URL: http://accounting:2025
      KOMUNITIN_APP_URL: ${KOMUNITIN_APP_URL}
      DATABASE_URL: postgresql://notifications:notifications@db-notifications-ts:5432/notifications?schema=public
      REDIS_URL: redis://db-notifications:6379
      AUTH_JWKS_URL: http://auth:2026/.well-known/jwks.json
      AUTH_JWT_ISSUER: ${KOMUNITIN_AUTH_URL:-http://localhost:2026}
      AUTH_JWT_AUDIENCE: urn:komunitin:api

      NOTIFICATIONS_CLIENT_ID: komunitin-notifications
      NOTIFICATIONS_CLIENT_SECRET: ${KOMUNITIN_NOTIFICATIONS_SECRET}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      
      APP_EMAIL: ${APP_EMAIL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}

      PUSH_NOTIFICATIONS_VAPID_PUBLIC_KEY: ${PUSH_NOTIFICATIONS_VAPID_PUBLIC_KEY}
      PUSH_NOTIFICATIONS_VAPID_PRIVATE_KEY: ${PUSH_NOTIFICATIONS_VAPID_PRIVATE_KEY}
      
      NOTIFICATIONS_EVENTS_USERNAME: komunitin
      NOTIFICATIONS_EVENTS_PASSWORD: ${KOMUNITIN_NOTIFICATIONS_SECRET}
      
      FLAVOR: ${KOMUNITIN_FLAVOR}
      
      PORT: 2023
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db-notifications-ts:
    build:
      context: ./shared/docker/db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_APP_USER: notifications
      POSTGRES_APP_PASSWORD: notifications
      WALG_ENABLE: ${DB_BACKUP_ENABLE:-true}
      WALG_S3_PREFIX: ${S3_PREFIX}/db-notifications
      WALG_COMPRESSION_METHOD: zstd
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      AWS_ENDPOINT: ${S3_ENDPOINT}
      AWS_REGION: ${S3_REGION:-us-east-1}
      AWS_S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    volumes:
      - db-notifications-ts:/var/lib/postgresql/data

  social:
    build:
      context: ./social
    restart: unless-stopped
    ports:
      - "2028:2028"
    depends_on:
      - db-social
    environment:
      PORT: 2028
      DATABASE_URL: postgresql://social:social@db-social:5432/social?schema=public
      API_BASE_URL: ${KOMUNITIN_SOCIAL_URL:-http://localhost:2028}
      ACCOUNTING_URL: http://accounting:2025
      NOTIFICATIONS_API_URL: http://notifications-ts:2023
      NOTIFICATIONS_API_USERNAME: komunitin
      NOTIFICATIONS_API_PASSWORD: ${KOMUNITIN_NOTIFICATIONS_SECRET}
      AUTH_JWKS_URL: http://auth:2026/.well-known/jwks.json
      AUTH_JWT_ISSUER: ${KOMUNITIN_AUTH_URL:-http://localhost:2026}
      AUTH_JWT_AUDIENCE: urn:komunitin:api
      UPLOAD_S3_PREFIX: ${S3_PREFIX}/uploads
      UPLOAD_S3_ENDPOINT: ${S3_ENDPOINT:-http://s3.test}
      UPLOAD_S3_REGION: ${S3_REGION:-us-east-1}
      UPLOAD_S3_ACCESS_KEY: ${S3_ACCESS_KEY:-test-access-key}
      UPLOAD_S3_SECRET_KEY: ${S3_SECRET_KEY:-test-secret-key}
      UPLOAD_S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db-social:
    build:
      context: ./shared/docker/db
      args:
        INSTALL_POSTGIS: "true"
        INSTALL_PGVECTOR: "true"
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_APP_USER: social
      POSTGRES_APP_PASSWORD: social
      POSTGRES_APP_EXTENSIONS: postgis,vector,pg_trgm,btree_gin,unaccent
      WALG_ENABLE: ${DB_BACKUP_ENABLE:-true}
      WALG_S3_PREFIX: ${S3_PREFIX}/db-social
      WALG_COMPRESSION_METHOD: zstd
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      AWS_ENDPOINT: ${S3_ENDPOINT}
      AWS_REGION: ${S3_REGION:-us-east-1}
      AWS_S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    volumes:
      - db-social:/var/lib/postgresql/data

volumes:
  db-accounting:
  db-auth:
  db-integralces:
  db-notifications:
  db-notifications-ts:
  db-social:
  integralces-sites:
