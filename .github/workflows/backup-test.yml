name: Test Backup
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *' # Runs daily at 4 AM UTC

permissions: {}

env:
  S3_PREFIX: ${{ vars.S3_PREFIX || 's3://komunitin' }}
  AWS_ENDPOINT: ${{ vars.S3_ENDPOINT || 'https://s3.gra.io.cloud.ovh.net' }}
  AWS_REGION: ${{ vars.S3_REGION || 'gra' }}
  AWS_S3_FORCE_PATH_STYLE: ${{ vars.S3_FORCE_PATH_STYLE || 'false' }}
  AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}

jobs:
  test-backup-accounting:
    runs-on: ubuntu-latest

    steps:
    - name: Pull db-accounting image
      run: |
        docker pull komunitin/komunitin-db:latest

    - name: Restore accounting database from latest backup
      run: |
        docker run -d \
        --name db-accounting \
        -e POSTGRES_USER=postgres \
        -e POSTGRES_PASSWORD=postgres \
        -e WALG_S3_PREFIX=$S3_PREFIX/db-accounting \
        -e WALG_COMPRESSION_METHOD=zstd \
        -e AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID \
        -e AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY \
        -e AWS_ENDPOINT=$AWS_ENDPOINT \
        -e AWS_REGION=$AWS_REGION \
        -e AWS_S3_FORCE_PATH_STYLE=$AWS_S3_FORCE_PATH_STYLE \
        --user postgres \
        --entrypoint /bin/bash \
        komunitin/komunitin-db:latest \
        /usr/local/bin/restore_backup.sh

    - name: Wait for the accounting DB to start and restore
      run: |
        sleep 30
    - name: Print accounting docker logs
      run: |
        docker logs db-accounting

    - name: Verify accounting database restoration
      run: |
        echo "Checking for recent transfers in the restored database..."
        count=$(docker exec db-accounting psql -U postgres -d accounting -t -A -c "SELECT COUNT(*) FROM \"Transfer\" WHERE created > NOW() - INTERVAL '24 hours';")
        if [ "$count" -eq 0 ]; then
          echo "ERROR: No recent transfers found in restored database"
          exit 1
        else
          echo "SUCCESS: Database restoration verified with $count transfers in the last 24 hours"
        fi

  test-backup-notifications:
    runs-on: ubuntu-latest

    steps:
    - name: Pull database image
      run: |
        docker pull komunitin/komunitin-db:latest

    - name: Restore notifications database from latest backup
      run: |
        docker run -d \
        --name db-notifications \
        -e POSTGRES_USER=postgres \
        -e POSTGRES_PASSWORD=postgres \
        -e WALG_S3_PREFIX=$S3_PREFIX/db-notifications \
        -e WALG_COMPRESSION_METHOD=zstd \
        -e AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID \
        -e AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY \
        -e AWS_ENDPOINT=$AWS_ENDPOINT \
        -e AWS_REGION=$AWS_REGION \
        -e AWS_S3_FORCE_PATH_STYLE=$AWS_S3_FORCE_PATH_STYLE \
        --user postgres \
        --entrypoint /bin/bash \
        komunitin/komunitin-db:latest \
        /usr/local/bin/restore_backup.sh

    - name: Wait for the notifications DB to start and restore
      run: |
        sleep 30
    - name: Print notifications docker logs
      run: |
        docker logs db-notifications

    - name: Verify notifications database restoration
      run: |
        echo "Checking for recent records in the restored notifications database..."
        count=$(docker exec db-notifications psql -U postgres -d notifications -t -A -c "
          SELECT
            (SELECT COUNT(*) FROM \"PushSubscription\" WHERE \"updatedAt\" > NOW() - INTERVAL '24 hours') +
            (SELECT COUNT(*) FROM \"AppNotification\" WHERE \"createdAt\" > NOW() - INTERVAL '24 hours');
        ")
        if [ "$count" -eq 0 ]; then
          echo "ERROR: No recent records found in PushSubscription.updatedAt or AppNotification.createdAt within the last 24 hours"
          exit 1
        else
          echo "SUCCESS: Database restoration verified with $count recent records in the last 24 hours"
        fi
